version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campusiq-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: campusiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campusiq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
